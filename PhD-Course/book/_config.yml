title: PhD Course Review Notes
author: Yunting

execute:
  execute_notebooks: off

html:
  use_multitoc_numbering: true

sphinx:
  extra_extensions:
    - sphinxcontrib.mermaid
    - sphinxcontrib.tikz
  local_extensions:
    tikz_lexer: _ext
    solution_block: _ext
  config:
    html_baseurl: https://yuning598.github.io/Notes
    html_show_copyright: false
    html_last_updated_fmt: '%b %d, %Y'
    html_extra_path:
      - robots.txt
      - attachment
    html_static_path:
      - _static
    html_css_files:
      - card-preview.css
    html_js_files:
      - card-preview.js
    templates_path:
      - _templates
    external_toc_path: _toc.yml
    external_toc_exclude_missing: false
    suppress_warnings:
      - toc.not_included
    myst_fence_as_directive:
      - mermaid
      - tikz
    tikz_latex_preamble: "% keep standalone TikZ builds from inheriting JupyterBook's LaTeX preamble"
    mermaid_version: "10.6.1"
    tikz_proc_suite: GhostScript
    html_theme_options:
      repository_url: https://github.com/Yuning598/Notes
      repository_branch: main
      path_to_docs: book
      use_edit_page_button: true
      use_repository_button: true
      use_issues_button: true

parse:
  myst_enable_extensions:
    - colon_fence
    - dollarmath
    - substitution
    - tasklist
  myst_fence_as_directive:
    - mermaid
    - tikz
  myst_links_external_new_tab: true
